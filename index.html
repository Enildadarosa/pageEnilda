                    <div class="timeline-year">${slide.year}</div>
                </div>
                <div class="timeline-title">${slide.title}</div>

            content.addEventListener('click', () => openModal(slide, dot));
            
            item.appendChild(dot);
            item.appendChild(content);
            timelineContainer.appendChild(item);
        });

        // Modal functions
        const modal = document.getElementById('modal');
        const modalClose = document.getElementById('modalClose');

        function openModal(slide, dot) {
            document.getElementById('modalYear').textContent = slide.year;
            document.getElementById('modalTitle').textContent = slide.title;
            document.getElementById('modalBody').innerHTML = slide.content;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
            
            // Atualizar estado ativo
            document.querySelectorAll('.timeline-dot.active').forEach(el => {
                el.classList.remove('active');
            });
            if (dot) {
                dot.classList.add('active');
            }
        }

        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
            document.querySelectorAll('.timeline-dot.active').forEach(el => {
                el.classList.remove('active');
            });
        }

        modalClose.addEventListener('click', closeModal);

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
